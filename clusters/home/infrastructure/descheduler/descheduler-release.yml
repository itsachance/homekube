apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: descheduler
  namespace: descheduler
spec:
  interval: 30m
  chart:
    spec:
      chart: descheduler
      version: '0.35.1'
      sourceRef:
        kind: HelmRepository
        name: descheduler-repo
        namespace: flux-system
  install:
    createNamespace: true
  targetNamespace: descheduler
