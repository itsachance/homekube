apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: descheduler
  namespace: descheduler
spec:
  interval: 30m
  chart:
    spec:
      chart: descheduler
      version: '0.35.1'
      sourceRef:
        kind: HelmRepository
        name: descheduler-repo
        namespace: flux-system
  values:
    schedule: "2 */2 * * *"
    deschedulerPolicy:
      profiles:
        - name: default
          pluginConfig:
            - name: DefaultEvictor
              args:
                podProtections:
                  defaultDisabled:
                    - PodsWithLocalStorage
                  extraEnabled:
                    - PodsWithPVC
            - name: LowNodeUtilization
              args:
                thresholds:
                  cpu: 15
                  memory: 15
                  pods: 25
                targetThresholds:
                  cpu: 40
                  memory: 40
                  pods: 40
          plugins:
            balance:
              enabled:
                - LowNodeUtilization
  install:
    createNamespace: true
  targetNamespace: descheduler
