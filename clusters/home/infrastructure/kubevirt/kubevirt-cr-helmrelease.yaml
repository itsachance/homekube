apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubevirt-cr
  namespace: flux-system
spec:
  targetNamespace: kubevirt
  interval: 10m
  dependsOn:
    - name: kubevirt-operator
  chart:
    spec:
      chart: kubevirt-cr
      version: "1.7.1"
      sourceRef:
        kind: HelmRepository
        name: kubevirt-charts
        namespace: flux-system
