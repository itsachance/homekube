apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-controller
  namespace: arc-runners
spec:
  interval: 30m
  chart:
    spec:
      chart: gha-runner-scale-set-controller
      version: "0.14.1"
      sourceRef:
        kind: HelmRepository
        name: arc-controller
        namespace: flux-system
  install:
    createNamespace: false
  targetNamespace: arc-runners
