apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name:  trean-runners
  namespace: arc-runners
spec:
  interval: 30m
  dependsOn:
    - name: arc-controller
      namespace: arc-runners
  chart:
    spec:
      chart: gha-runner-scale-set
      version: "0.10.1"
      sourceRef:
        kind: HelmRepository
        name: arc-runner-scale-set
        namespace: flux-system
  install:
    createNamespace: false
  targetNamespace: arc-runners
  values:
    githubConfigUrl: https://github.com/ItsAchance/3an
    githubConfigSecret: arc-github-pat
    runnerScaleSetName: trean-runners
    containerMode:
      type: dind
