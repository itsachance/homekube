apiVersion: apps/v1
kind: Deployment
metadata:
  name: filebrowser
  namespace: filebrowser
  labels:
    app: filebrowser
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: filebrowser
  template:
    metadata:
      labels:
        app: filebrowser
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: configure-auth
          image: filebrowser/filebrowser:v2.62.2
          command:
            - sh
            - -c
            - |
              filebrowser config init -d /database/filebrowser.db 2>/dev/null || true
              filebrowser config set -d /database/filebrowser.db --auth.method=proxy --auth.header=Remote-User
          volumeMounts:
            - name: database-vol
              mountPath: /database
      containers:
        - name: filebrowser
          image: filebrowser/filebrowser:v2.62.2
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: FB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: filebrowser-secrets
                  key: FB_USERNAME
          args:
            - --username
            - "$(FB_USERNAME)"
          ports:
            - containerPort: 80
          volumeMounts:
            - name: data-files
              mountPath: /srv
            - name: database-vol
              mountPath: /database
            - name: config
              mountPath: /config/settings.json
              subPath: settings.json
      volumes:
        - name: data-files
          persistentVolumeClaim:
            claimName: filebrowser-data-pvc
        - name: database-vol
          persistentVolumeClaim:
            claimName: filebrowser-db-pvc
        - name: config
          configMap:
            name: filebrowser-settings
---
apiVersion: v1
kind: Service
metadata:
  name: filebrowser-service
  namespace: filebrowser
spec:
  selector:
    app: filebrowser
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
