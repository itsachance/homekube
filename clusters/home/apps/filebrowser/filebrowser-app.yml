apiVersion: apps/v1
kind: Deployment
metadata:
  name: filebrowser
  namespace: filebrowser
  labels:
    app: filebrowser
spec:
  replicas: 1
  selector:
    matchLabels:
      app: filebrowser
  template:
    metadata:
      labels:
        app: filebrowser
    spec:
      containers:
        - name: filebrowser
          image: filebrowser/filebrowser:v2.59.0
          ports:
            - containerPort: 80
          volumeMounts:
            - name: data-files
              mountPath: /srv
            - name: database-vol
              mountPath: /database
      volumes:
        - name: data-files
          persistentVolumeClaim:
            claimName: filebrowser-data-pvc
        - name: database-vol
          persistentVolumeClaim:
            claimName: filebrowser-db-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: filebrowser-service
  namespace: filebrowser
spec:
  selector:
    app: filebrowser
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP

