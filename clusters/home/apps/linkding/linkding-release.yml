apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: linkding
  namespace: linkding
spec:
  values:
    env:
      - name: LD_SUPERUSER_NAME
        valueFrom:
          secretKeyRef:
            name: linkding-secrets
            key: LD_SUPERUSER_NAME
      - name: LD_SUPERUSER_PASSWORD
        valueFrom:
          secretKeyRef:
            name: linkding-secrets
            key: LD_SUPERUSER_PASSWORD
      - name: LD_ENABLE_AUTH_PROXY
        value: "True"
      - name: LD_AUTH_PROXY_USERNAME_HEADER
        value: "HTTP_REMOTE_USER"
      - name: LD_AUTH_PROXY_LOGOUT_URL
        value: "https://auth.bytechance.dev/logout"
    service:
      type: ClusterIP
      port: 80
  interval: 30m
  chart:
    spec:
      chart: linkding
      version: '3.0.0'
      sourceRef:
        kind: HelmRepository
        name: linkding-repo
        namespace: flux-system
  install:
    createNamespace: true
