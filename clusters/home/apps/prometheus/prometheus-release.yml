apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: monitoring
spec:
  values:
    extraScrapeConfigs: |
      - job_name: linux-servers
        static_configs:
          - targets:
              - "192.168.200.4:9100"
            labels:
              instance: "boromir"
              os: "almalinux"
      - job_name: pfsense
        static_configs:
          - targets:
              - "192.168.200.1:9273"
            labels:
              instance: "pfsense"
              os: "freebsd"
      - job_name: truenas
        static_configs:
          - targets:
              - "graphite-exporter.monitoring.svc:9108"
            labels:
              instance: "truenas"
              os: "debian"
    server:
      service:
        type: ClusterIP
        port: 9090
      persistence:
        enabled: true
        storageClass: null
        size: 15Gi
      retention: 15d
  interval: 30m
  chart:
    spec:
      chart: prometheus
      version: '28.14.0'
      sourceRef:
        kind: HelmRepository
        name: prometheus-repo
        namespace: flux-system
  install:
    createNamespace: true
