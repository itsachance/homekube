apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: monitoring
spec:
  values:
    extraScrapeConfigs: |
      - job_name: linux-servers
        static_configs:
          - targets:
              - "192.168.200.4:9100"
            labels:
              instance: "boromir"
              os: "almalinux"
          - targets:
              - "192.168.200.21:9100"
            labels:
              instance: "k3sMaster01"
              os: "almalinux"
          - targets:
              - "192.168.200.20:9100"
            labels:
              instance: "k3sMaster02"
              os: "almalinux"
      - job_name: pfsense
        static_configs:
          - targets:
              - "192.168.200.1:9273"
            labels:
              instance: "pfsense"
              os: "freebsd"
      - job_name: truenas
        static_configs:
          - targets:
              - "graphite-exporter.monitoring.svc:9108"
            labels:
              instance: "truenas"
              os: "debian"
    scrapeConfigs:
      kubernetes-api-servers:
        metric_relabel_configs:
          - source_labels: [__name__]
            regex: '(apiserver_request_duration_seconds|etcd_request_duration_seconds|apiserver_request_sli_duration_seconds|apiserver_request_body_size_bytes|apiserver_watch_cache_read_wait_seconds|apiserver_watch_list_duration_seconds|apiserver_response_sizes|apiserver_watch_events_sizes|workqueue_queue_duration_seconds|workqueue_work_duration_seconds)_bucket'
            action: drop
      kubernetes-nodes:
        metric_relabel_configs:
          - source_labels: [__name__]
            regex: '(apiserver_|etcd_|workqueue_|aggregator_|authentication_|disabled_metric_|registered_metric_).*'
            action: drop
    server:
      resources:
        limits:
          memory: 4Gi
        requests:
          memory: 2Gi
      persistentVolume:
        annotations:
          helm.sh/resource-policy: keep
        size: 25Gi
      service:
        type: ClusterIP
        port: 9090
      retention: 15d
  interval: 30m
  chart:
    spec:
      chart: prometheus
      version: '29.14.0'
      sourceRef:
        kind: HelmRepository
        name: prometheus-repo
        namespace: flux-system
  install:
    createNamespace: true
