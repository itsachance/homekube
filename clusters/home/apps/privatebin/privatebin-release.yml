apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: privatebin
  namespace: privatebin
spec:
  values:
    service:
      type: ClusterIP
      port: 80
  interval: 30m
  chart:
    spec:
      chart: privatebin
      version: '0.23.4'
      sourceRef:
        kind: HelmRepository
        name: privatebin-repo
        namespace: flux-system
  install:
    createNamespace: true
