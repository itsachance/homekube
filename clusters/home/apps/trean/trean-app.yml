apiVersion: apps/v1
kind: Deployment
metadata:
  name: trean
  namespace: trean
  labels:
    app: trean
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trean
  template:
    metadata:
      labels:
        app: trean
    spec:
      initContainers:
      - name: wait-for-db
        image: postgres:17-alpine
        command:
        - sh
        - -c
        - |
          until pg_isready -h trean-db-rw -U postgre; do
            echo "Waiting for database..."
            sleep 2
          done
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: trean-db-superuser
              key: password
      containers:
      - name: trean
        image: ghcr.io/itsachance/3an:v1.2.1
        ports:
        - containerPort: 5500
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
