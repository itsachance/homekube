---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: miniflux-db
  namespace: miniflux
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  
  postgresql:
    parameters:
      max_connections: "200"
  
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1"
  
  storage:
    size: 5Gi
    storageClass: longhorn
  
  bootstrap:
    initdb:
      database: miniflux
      owner: miniflux
      secret:
        name: miniflux-db-superuser
