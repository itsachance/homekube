apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  values:
    deploymentStrategy:
      type: Recreate
    admin:
      existingSecret: grafana-secrets
      userKey: admin-user
      passwordKey: admin-password
    service:
      type: ClusterIP
      port: 3000
    persistence:
      enabled: true
      type: pvc
      size: 4Gi
    grafana.ini:
      server:
        root_url: https://grafana.bytechance.dev
      users:
        auto_assign_org_role: Admin
      auth.generic_oauth:
        enabled: true
        name: OAuth
        client_id: grafana
        client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
        scopes: openid profile email
        auth_url: https://auth.bytechance.dev/api/oidc/authorization
        token_url: https://auth.bytechance.dev/api/oidc/token
        api_url: https://auth.bytechance.dev/api/oidc/userinfo
        use_pkce: true
    envValueFrom:
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
        secretKeyRef:
          name: grafana-secrets
          key: GRAFANA_OAUTH_CLIENT_SECRET
  interval: 30m
  chart:
    spec:
      chart: grafana
      version: '10.5.15'
      sourceRef:
        kind: HelmRepository
        name: grafana-repo
        namespace: flux-system
  install:
    createNamespace: true
