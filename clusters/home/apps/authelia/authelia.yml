apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: authelia-data
  namespace: authelia
  labels:
    app: authelia
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authelia
  namespace: authelia
  labels:
    app: authelia
spec:
  replicas: 1
  strategy:
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      app: authelia
  template:
    metadata:
      labels:
        app: authelia
      annotations:
        checksum/config: "cbc2e31f2af92abe16d4bd7b241cf5ca94c536d0662a71066fe5ffb0bf190f21"
    spec:
      initContainers:
        - name: wait-for-valkey
          image: valkey/valkey:8-alpine
          command:
            - sh
            - -c
            - |
              until valkey-cli -h valkey -a "$VALKEY_PASSWORD" ping | grep -q PONG; do
                echo "Waiting for Valkey..."
                sleep 2
              done
          env:
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authelia-secrets
                  key: VALKEY_PASSWORD
      containers:
        - name: authelia
          image: authelia/authelia:4.39
          ports:
            - containerPort: 9091
              name: http
          command:
            - 'authelia'
          args:
            - '--config=/config/configuration.yml'
            - '--config.experimental.filters=template'
          env:
            - name: AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE
              value: /secrets/JWT_SECRET
            - name: AUTHELIA_SESSION_SECRET_FILE
              value: /secrets/SESSION_SECRET
            - name: AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE
              value: /secrets/STORAGE_ENCRYPTION_KEY
            - name: AUTHELIA_SESSION_REDIS_PASSWORD_FILE
              value: /secrets/VALKEY_PASSWORD
            - name: AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET_FILE
              value: /secrets/OIDC_HMAC_SECRET
            - name: TZ
              value: "Europe/Stockholm"
          volumeMounts:
            - name: config
              mountPath: /config/configuration.yml
              subPath: configuration.yml
              #   readOnly: true
            - name: users
              mountPath: /config/users_database.yml
              subPath: users_database.yml
              #   readOnly: true
            - name: secrets
              mountPath: /secrets
              readOnly: true
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 9091
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 9091
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: authelia-config
        - name: users
          secret:
            secretName: authelia-users
        - name: secrets
          secret:
            secretName: authelia-secrets
        - name: data
          persistentVolumeClaim:
            claimName: authelia-data
---
apiVersion: v1
kind: Service
metadata:
  name: authelia-svc
  namespace: authelia
  labels:
    app: authelia
spec:
  selector:
    app: authelia
  ports:
    - port: 9091
      targetPort: 9091
      name: http
  type: ClusterIP
