---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authelia-config
  namespace: authelia
  labels:
    app: authelia
data:
  configuration.yml: |
    # Authelia Configuration
    # https://www.authelia.com/configuration/

    theme: auto

    server:
      address: 'tcp://:9091'
      buffers:
        read: 4096
        write: 4096

    log:
      level: info
      format: text

    telemetry:
      metrics:
        enabled: false

    totp:
      disable: false

    webauthn:
      disable: false
      display_name: 'Authelia'
      timeout: '60 seconds'
      selection_criteria:
        attachment: ''
        discoverability: 'preferred'
        user_verification: 'preferred'

    authentication_backend:
      password_reset:
        disable: true  # Disable password reset via notification for now
      file:
        path: /config/users_database.yml
        password:
          algorithm: argon2id
          iterations: 3
          memory: 65536
          parallelism: 4
          key_length: 32
          salt_length: 16

    access_control:
      default_policy: deny
      rules:
        # Allow all authenticated users to access any subdomain
        - domain: '*.bytechance.dev'
          policy: two_factor

    session:
      name: authelia_session
      same_site: lax
      inactivity: 5m
      expiration: 1h
      remember_me: 1M
      cookies:
        - domain: 'bytechance.dev'
          authelia_url: 'https://auth.bytechance.dev'
          default_redirection_url: 'https://bytechance.dev'
      redis:
        host: valkey
        port: 6379
        # Password is injected via environment variable

    regulation:
      max_retries: 3
      find_time: 2m
      ban_time: 5m

    storage:
      local:
        path: /data/db.sqlite3

    notifier:
      # Using filesystem notifier - password reset links written to file
      filesystem:
        filename: /data/notification.txt

    identity_providers:
      oidc:
        jwks:
        - key_id: 'main'
          algorithm: 'RS256'
          use: 'sig'
          key: {{ secret "/secrets/OIDC_JWKS_RS256_KEY" | mindent 10 "|" | msquote }}
        cors:
          endpoints:
            - 'authorization'
            - 'token'
            - 'revocation'
            - 'introspection'
            - 'userinfo'
          allowed_origins_from_client_redirect_uris: true
        clients:
          - client_id: 'immich'
            client_name: 'immich'
            client_secret: '$pbkdf2-sha512$310000$kKAu434LkM0s.4.hBFEtYA$poIXm4Itwu6DQ8bF4wVPb25nEmfr9hB4M90xp7MBgDQkDC5jF9FwWp/N3JGXxCVQl/PlcxFh7h/tL4ECSzTNsA'
            public: false
            authorization_policy: 'two_factor'
            require_pkce: false
            redirect_uris:
              - 'https://immich.bytechance.dev/auth/login'
              - 'https://immich.bytechance.dev/user-settings'
              - 'app.immich:///oauth-callback'
            scopes:
              - 'openid'
              - 'profile'
              - 'email'
            response_types:
              - 'code'
            grant_types:
              - 'authorization_code'
            access_token_signed_response_alg: 'none'
            userinfo_signed_response_alg: 'none'
            token_endpoint_auth_method: 'client_secret_post'

          - client_id: 'linkding'
            client_name: 'linkding'
            client_secret: '$pbkdf2-sha512$310000$wQ2LxH81t6aep4h.s7R03Q$tnozufHbesZBsnMZlSv0dnOpEeZztNnSf2tu5iH6ZK/nqi.6Wo0fzj1j2mAQLHhC7uUKVJ3VwjGKroVIT5IYwg'
            public: false
            authorization_policy: 'two_factor'
            require_pkce: true
            pkce_challenge_method: 'S256'
